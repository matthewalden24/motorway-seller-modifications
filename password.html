<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motorway – Enter Password</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }
    body {
      font-family:-apple-system, BlinkMacSystemFont, sans-serif;
      background:#1a1a1a; display:flex; align-items:center; justify-content:center;
      height:100vh; padding:20px;
    }
    .password-container {
      background:#fff; border-radius:24px; padding:40px 32px;
      width:100%; max-width:360px; display:flex; flex-direction:column;
      align-items:center; gap:24px;
      box-shadow:0 0 0 1px rgba(255,255,255,0.1), 0 25px 80px rgba(0,0,0,0.5);
    }
    .password-container__title {
      font-size:24px; font-weight:600; color:#242424; text-align:center;
    }
    .password-container__subtitle {
      font-size:16px; font-weight:400; color:#585858; text-align:center; line-height:1.44;
    }
    .password-container__input {
      width:100%; height:48px; border:2px solid rgba(0,0,0,0.1); border-radius:12px;
      padding:0 16px; font-size:16px; color:#242424; outline:none;
      transition:border-color 0.2s ease;
    }
    .password-container__input:focus { border-color:#242424; }
    .password-container__input.error { border-color:#E65100; }
    .password-container__error {
      font-size:14px; color:#E65100; display:none; text-align:center;
    }
    .password-container__error.visible { display:block; }
    .password-container__btn {
      width:100%; height:48px; background:#242424; border-radius:100px; border:none;
      font-size:18px; font-weight:500; color:#fff; letter-spacing:-0.72px;
      cursor:pointer; transition:background 0.2s ease, transform 0.15s ease;
    }
    .password-container__btn:active { background:#1a1a1a; transform:scale(0.97); }
  </style>
</head>
<body>
  <div class="password-container">
    <h1 class="password-container__title">Enter password</h1>
    <p class="password-container__subtitle">This prototype is password protected.</p>
    <input type="password" class="password-container__input" id="passwordInput" placeholder="Password" autocomplete="off">
    <p class="password-container__error" id="errorMsg">Incorrect password</p>
    <button class="password-container__btn" id="submitBtn">Continue</button>
  </div>
  <script>
    const HASH = '5ae073a3a8e68455a57b03664d4ce77198e9ad62c7fd89a522b7b06c968dca2c';

    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    // Check if already authenticated
    if (sessionStorage.getItem('authed') === '1') {
      window.location.replace('index.html');
    }

    const input = document.getElementById('passwordInput');
    const btn = document.getElementById('submitBtn');
    const error = document.getElementById('errorMsg');

    async function submit() {
      const hash = await sha256(input.value);
      if (hash === HASH) {
        sessionStorage.setItem('authed', '1');
        window.location.replace('index.html');
      } else {
        input.classList.add('error');
        error.classList.add('visible');
        input.value = '';
        input.focus();
      }
    }

    btn.addEventListener('click', submit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submit();
      input.classList.remove('error');
      error.classList.remove('visible');
    });
  </script>
</body>
</html>
